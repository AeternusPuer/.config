windowrule {
    name = razergenie
    match:class = ^(xyz.z3ntu.razergenie)$
    animation = popin
    stay_focused = off
    opacity = 0.9
}
windowrule {
    name = lxpolkit
    match:class = ^(lxpolkit)$
    animation = popin
    stay_focused = on
    opacity = 0.85
}
