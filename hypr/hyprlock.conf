$font = Fira Code
$text_color = rgb(255, 255, 255)
background {
    monitor = DP-2
    path = ~/.config/hypr/images/screenlook.jpeg
    #  path = screenshot
    color = rgba(221, 18, 18, 0) 
    blur_passes = 1 # 0 disables blurring
    blur_size =1
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}
general {
    hide_cursor = true
    ignore_empty_input = true     # <-- Ваш параметр здесь
    disable_loading_bar = false\
    grace = 10
}
input-field {
    monitor = DP-2
    size = 300, 60                                  # Ширина и высота
    outline_thickness = -1                          # Толщина рамки
    dots_size = 0.33                                # Определяет размер точек-заменителей, которые отображаются в поле ввода при наборе пароля (если включено скрытие ввода).
    dots_spacing = 0.15                             # Определяет межсимвольный интервал как масштаб относительно размера самой точки
    dots_center = true
    dots_rounding = -1                              # Круглые точки
    outer_color =  rgba(0, 0, 0, 0) 
    inner_color = rgba(0, 0, 0, 0) 
    font_color = $text_color
    font_family = Noto Sans
    fade_on_empty = false                           # Включает эффект затухания (плавное исчезновение) для поля ввода пароля, когда оно пустое
    placeholder_text = <i></i> 
    hide_input = false
    rounding = 4                                  # Круглое поле                                                                   
    fail_color = rgba(221, 18, 18, 0) 
    fail_text = <i>Неверный пароль <b>($ATTEMPTS)</b></i> 
    capslock_color = rgba(255, 165, 0, 1) 
    numlock_color = rgba(255, 100, 0, 1)
    bothlock_color = rgba(255, 165, 0, 1) rgba(255, 100, 0, 1) 45deg
    invert_numlock = false 
    swap_font_color = false
    position = 0, 40
    halign = center
    valign = bottom
}
label {
    monitor = DP-2
    font_family = $font
    text = $TIME            # Встроенная переменная времени
    font_size = 80
    position = 0, -100      # Смещение по X, Y
    valign = top
    color = $text_color

}
label {
    monitor = DP-2
    font_family = $font
    text = $USER 
    font_size = 14
    position = 10, -10      
    valign = top
    halign = left
    color = $text_color
}
label {
    monitor = DP-2
    font_family = $font
    text =$LAYOUT[🇺🇸,🇷🇺]
    font_size = 14
    position = -10, -10      
    valign = top
    halign = right   
}
